<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=620">
<title>N64 → SoH Save Converter</title>
<style>
@font-face {
  font-family: 'HyliaSerif';
  src: url('fonts/HyliaSerifBeta-Regular.otf') format('opentype');
}
:root {
  --bg: #080C16;
  --panel: #111827;
  --panel-hi: #1A2236;
  --gold: #C8A84E;
  --gold-dim: #7D6A33;
  --text: #CCC4B2;
  --text-dim: #706B60;
  --border: #232D42;
  --green: #4CAF50;
  --red: #C1443E;
  --blue: #4E8AC1;
  --font-display: 'HyliaSerif', Georgia, serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;line-height:1.5;min-height:100vh}
#app{max-width:600px;margin:0 auto;padding:2rem 1.5rem}

.page-header{text-align:center;margin-bottom:2rem}
.page-header h1{font-family:var(--font-display);font-size:2rem;color:var(--gold);letter-spacing:.02em;margin-bottom:.25rem}
.page-header p{color:var(--text-dim);font-size:.875rem}
.repo-link{color:var(--gold-dim);font-size:.75rem;text-decoration:none;letter-spacing:.03em}
.repo-link:hover{color:var(--gold)}

.drop-zone{border:2px dashed var(--gold-dim);border-radius:8px;padding:3rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:2rem}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--gold);background:rgba(200,168,78,.05)}
.drop-zone svg{margin-bottom:.75rem}
.drop-zone p{color:var(--text-dim)}
.drop-zone strong{color:var(--gold)}
.drop-zone .small{font-size:.75rem;margin-top:.5rem;opacity:.6}
.drop-zone.loaded{border-style:solid;border-color:var(--green);padding:1.5rem}

.file-info{text-align:left}
.file-info-name{font-family:var(--font-display);font-size:1.1rem;color:var(--green);margin-bottom:.6rem}
.file-info-details{display:flex;flex-wrap:wrap;gap:.4rem .75rem}
.file-info-item{font-size:.8rem;color:var(--text);display:inline-flex;gap:.3rem}
.file-info-label{color:var(--gold-dim);font-weight:600}
.file-info-label::after{content:':'}

.error-msg{background:rgba(193,59,59,.1);border:1px solid var(--red);color:#E5A0A0;padding:1rem;border-radius:6px;margin-bottom:1rem;font-size:.875rem}

/* === FILE SLOT BARS === */
.slot-bar{cursor:pointer;user-select:none;margin-bottom:4px;position:relative;
  height:0;padding-bottom:9.52%;/* 16/168 ratio */
  background-size:100% 100%;background-repeat:no-repeat;image-rendering:pixelated;overflow:hidden}
.slot-bar:hover{filter:brightness(1.2)}
.slot-bar.active{filter:brightness(1.3)}
.slot-bar-content{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;padding:0 5% 0 20%}
.slot-file-label{position:absolute;top:0;bottom:0;left:30px;display:flex;align-items:center;
  font-family:var(--font-display);font-size:1.3rem;color:#fff;text-shadow:2px 2px 2px rgba(0,0,0,.9)}
.slot-bar .slot-name{font-family:var(--font-display);font-size:1.5rem;color:#fff;text-shadow:3px 3px 2px rgba(0,0,0,.9)}
.slot-bar .slot-badge{font-size:1rem;padding:2px 8px;border-radius:3px;background:rgba(0,0,0,.4);color:#ccc;margin-left:auto}

/* === EXPANDED PANEL === */
.slot-panel{display:none;margin-bottom:2.5rem}
.slot-panel.visible{display:block}

/* Summary with file_details bg */
.slot-summary-bg{background:url('images/backgrounds/file_details.png') no-repeat;background-size:100% 100%;
  image-rendering:pixelated;padding:1rem 1.25rem;border-radius:0;margin-bottom:.5rem}
.slot-summary{display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap}
.slot-stats{display:flex;flex-direction:column;gap:.3rem;min-width:90px}
.stat{display:flex;align-items:center;gap:6px;font-family:var(--font-display);font-size:1.1rem;
  font-variant-numeric:tabular-nums;color:#fff;text-shadow:3px 3px 2px rgba(0,0,0,.9)}
.stat img{width:32px;height:32px;image-rendering:pixelated}
.slot-hearts{flex:1;min-width:200px;display:flex;flex-direction:column;align-items:flex-end}
.hearts-row{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:2px;justify-content:flex-end}
.hearts-row img{width:32px;height:32px;image-rendering:pixelated}
.hearts-row img.empty-heart{opacity:.15}
.slot-quest{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-top:.5rem;justify-content:flex-end}
.quest-icon{width:32px;height:32px;image-rendering:pixelated}
.quest-icon.off{opacity:.12;filter:grayscale(1)}

/* === PAUSE MENU CAROUSEL === */
.pause-wrap{}
.pause-tabs{display:flex;gap:2px;margin-bottom:2px}
.pause-tab{flex:1;padding:6px 0;text-align:center;font-family:var(--font-display);font-size:1.25rem;
  letter-spacing:.04em;cursor:pointer;
  background:url('images/backgrounds/tab_bg.png') no-repeat center/100% 100%;color:#666;
  border:none;transition:all .15s;
  text-shadow:2px 2px 2px rgba(0,0,0,.9);border-radius:0;image-rendering:pixelated}
.pause-tab:hover{color:#999}
.pause-tab.active{color:var(--gold);background:url('images/backgrounds/tab_active.png') no-repeat center/100% 100%;image-rendering:pixelated}

.pause-screen{display:none;border-radius:0;overflow:visible;position:relative}
.pause-screen.visible{display:block}
.pause-bg-wrap{position:relative;width:100%;height:0;padding-bottom:69.14%;/* 168/243 ratio */}
.pause-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:fill;image-rendering:pixelated;pointer-events:none}
.pause-content{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto}
.items-content{padding:53px 50px 24px 48px}
.equip-content{padding:50px 24px 24px 10px}
.quest-content{padding:50px 42px 24px 22px}
.save-content{padding:50px 22px 24px 20px;display:flex;align-items:center;justify-content:center}

/* Items grid inside pause screen */
.items-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:0}
.item-cell{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.item-cell.empty{opacity:.15}
.item-cell.has-item{}
.item-icon{width:70%;height:70%;object-fit:contain;image-rendering:pixelated}
.item-icon-empty{width:70%;height:70%}
.item-ammo{position:absolute;bottom:2px;left:4px;color:var(--gold);font-weight:700;
  font-family:monospace;font-size:1.25rem;font-variant-numeric:tabular-nums;text-shadow:3px 3px 2px rgba(0,0,0,.9);z-index:3}

/* Equipment layout: upgrades | gap | equipment */
.equip-layout{display:flex;height:100%;align-items:stretch}
.equip-upgrades{display:grid;grid-template-rows:repeat(4,1fr);gap:0;width:85px}
.equip-spacer{flex:1}
.equip-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,1fr);gap:0;width:224px}
.eq-cell{position:relative;display:flex;align-items:center;justify-content:center}
.eq-cell.eq-empty{}
.eq-cell.eq-owned{opacity:.6}
.eq-cell.eq-equipped{background:url('images/ui/cursor_white.png') no-repeat center/contain;image-rendering:pixelated}
.eq-cell::after,.item-cell::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:url('images/ui/cursor_yellow.png') no-repeat center/contain;image-rendering:pixelated;
  opacity:0;pointer-events:none;z-index:2}
.eq-cell:hover::after,.item-cell:hover::after{opacity:1}
.eq-icon{width:70%;height:70%;object-fit:contain;image-rendering:pixelated}

/* Quest screen layout */
.quest-layout{position:relative;width:100%;height:100%}

/* Top-left: quest items (2x2 grid) */
.quest-items-area{position:absolute;top:2px;left:1px;display:grid;grid-template-columns:50px 50px;grid-template-rows:50px 50px;gap:12px}
.qi-cell{display:flex;align-items:center;justify-content:center;padding:4px}
.qi-img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.qi-off{opacity:.15;filter:grayscale(1)}
.qi-skull-img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.qi-skull-count{font-family:var(--font-display);font-size:1.1rem;color:#fff;text-shadow:2px 2px 2px rgba(0,0,0,.9);margin-right:10px}

/* Heart pieces (2x2 grid) */
.quest-hearts-area{position:absolute;top:3px;left:132px;display:grid;grid-template-columns:56px 56px;grid-template-rows:56px 56px;gap:0}
.qhp{display:flex;align-items:center;justify-content:center}
.qhp img{width:100%;height:100%;image-rendering:pixelated}

/* Top-right: medallions hexagon */
.quest-medallions{position:absolute;top:0;right:3px;width:194px;height:233px}
.qm{position:absolute;width:45px;height:45px}
.qm img{width:100%;height:100%;image-rendering:pixelated}
.qm-light{left:75px;top:12px}
.qm-forest{left:139px;top:55px}
.qm-fire{left:140px;top:132px}
.qm-water{left:74px;top:175px}
.qm-spirit{left:12px;top:132px}
.qm-shadow{left:12px;top:55px}

/* Bottom-left: songs */
.quest-songs{position:absolute;top:140px;left:10px;display:grid;grid-template-columns:repeat(6,29px);grid-template-rows:46px 46px;gap:4px 13px}
.qs{display:flex;align-items:center;justify-content:center;width:28px;height:46px}
.qs.qs-on{opacity:1}
.qs-note{width:28px;height:auto;image-rendering:pixelated;filter:drop-shadow(2px 2px 1px rgba(0,0,0,.7))}

/* Bottom-right: stones */
.quest-stones{position:absolute;bottom:12px;right:24px;display:flex;gap:22px;align-items:center}
.qst{width:36px;height:36px}
.qst img{width:100%;height:100%;image-rendering:pixelated}

/* Name bar at bottom of pause screen */
.pause-namebar{position:relative;width:256px;height:40px;margin:-20px auto 0;
  z-index:3;background:url('images/backgrounds/namebar.png') no-repeat center/100% 100%;image-rendering:pixelated;
  border-top:2px solid #787878;border-left:2px solid #787878;
  border-bottom:2px solid #383838;border-right:2px solid #383838;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),inset 0 -1px 0 rgba(0,0,0,.2);
  pointer-events:none}
.pause-namebar span{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:1.4rem;color:#e0e0e0;text-shadow:1px 1px 2px rgba(0,0,0,.8)}

/* Upgrades row in equip screen */
.upgrades-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;justify-content:center}
.upg-item{width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.upg-icon{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.upg-text{font-size:.5rem;color:var(--text);text-align:center;line-height:1.1}

/* Section titles inside pause screens */
.p-section{margin-top:1rem}
.p-section:first-child{margin-top:0}
.p-section-title{font-family:var(--font-display);font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gold-dim);margin-bottom:.5rem}

/* Export & Save screen */
.save-screen-inner{padding:.5rem}
.save-edit{margin-bottom:1rem}
.save-edit-title{font-family:var(--font-display);font-size:.8rem;color:var(--gold-dim);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.04em}
.save-edit-fields{display:flex;gap:.75rem;flex-wrap:wrap}
.save-edit-fields label{font-size:.75rem;color:var(--text-dim);display:flex;flex-direction:column;gap:2px}
.save-field{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.15);color:var(--text);padding:.35rem .5rem;
  font-size:.85rem;width:100px;font-family:var(--font-display)}
.save-field:focus{outline:none;border-color:var(--gold-dim)}
.save-export{border-top:1px solid rgba(255,255,255,.1);padding-top:.75rem}
.save-export-slots{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.75rem}
.save-slot-check{font-size:.8rem;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:.4rem}
.save-slot-check.disabled{color:var(--text-dim);opacity:.4;cursor:default}
.save-slot-check input{accent-color:var(--gold)}
.save-export-actions{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
.export-btn{background:var(--gold);color:var(--bg);border:none;padding:.45rem 1.25rem;font-weight:600;cursor:pointer;font-size:.85rem;font-family:var(--font-display)}
.export-btn:hover{filter:brightness(1.1)}
.preview-btn{background:rgba(255,255,255,.1);color:var(--text);border:1px solid rgba(255,255,255,.2);padding:.45rem 1rem;cursor:pointer;font-size:.85rem;font-family:var(--font-display)}
.preview-btn:hover{background:rgba(255,255,255,.15)}
.export-input{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.15);color:var(--text);padding:.4rem .6rem;font-size:.85rem;width:100px}
.export-input:focus{outline:none;border-color:var(--gold-dim)}
.export-hint{font-size:.7rem;color:var(--text-dim);display:block;margin-top:.3rem}

/* Slot validation warning */
.slot-warning{background:rgba(180,140,20,.15);border:1px solid rgba(180,140,20,.3);color:#d4a830;
  font-size:.75rem;padding:.3rem .6rem;margin-bottom:4px}

/* Preview modal */
#previewModal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;z-index:100}
.preview-box{background:var(--panel);border:1px solid var(--border);max-width:500px;width:90%;max-height:80vh;display:flex;flex-direction:column}
.preview-header{font-family:var(--font-display);font-size:1.1rem;color:var(--gold);padding:.75rem 1rem;border-bottom:1px solid var(--border)}
.preview-box pre{flex:1;overflow:auto;padding:1rem;font-size:.8rem;color:var(--text);margin:0}
.preview-actions{display:flex;gap:.75rem;padding:.75rem 1rem;border-top:1px solid var(--border);justify-content:flex-end}

/* SoH save upgrade result */
.upgrade-result{background:var(--panel);border:1px solid var(--border);padding:1.5rem;margin-top:1rem}
.upgrade-ok{font-family:var(--font-display);font-size:1.1rem;color:var(--green);margin-bottom:.75rem}
.upgrade-error{font-family:var(--font-display);font-size:1.1rem;color:var(--red);margin-bottom:.75rem}
.upgrade-changes{list-style:disc;margin-left:1.5rem;margin-bottom:1rem;color:var(--text);font-size:.85rem}
.upgrade-changes li{margin-bottom:.3rem}
.upgrade-info{font-size:.9rem;color:var(--text-dim);margin-bottom:1rem}
.upgrade-actions{display:flex;gap:.75rem}

/* Item color coding */
.ic-blue{background:rgba(50,80,160,.4)}
.ic-green{background:rgba(50,140,60,.4)}
.ic-red{background:rgba(160,50,50,.4)}
.ic-orange{background:rgba(180,120,40,.4)}
.ic-purple{background:rgba(120,50,160,.4)}
.ic-cyan{background:rgba(40,150,170,.4)}
.ic-yellow{background:rgba(180,170,40,.4)}
.ic-brown{background:rgba(140,100,50,.4)}

</style>
</head>
<body>
<div id="app">
  <div class="page-header">
    <h1>N64 → SoH Save Converter</h1>
    <p>N64 .sra → SoH .sav  ·  SoH save version upgrade</p>
    <a class="repo-link" href="https://github.com/ctgl1987/n64-to-soh" target="_blank">GitHub</a>
  </div>
  <div id="error" class="error-msg" style="display:none"></div>
  <div id="dropZone" class="drop-zone">
    <svg width="48" height="42" viewBox="0 0 48 42"><polygon points="24,0 36,21 12,21" fill="#C8A84E" opacity=".8"/><polygon points="12,21 24,42 0,42" fill="#C8A84E" opacity=".5"/><polygon points="36,21 48,42 24,42" fill="#C8A84E" opacity=".5"/></svg>
    <p>Drop your <strong>.sra</strong> or <strong>.sav</strong> file here or <strong>click</strong> to browse</p>
    <p class="small">N64 saves (.sra/.srm) or old SoH saves (.sav) for version upgrade</p>
    <input type="file" id="fileInput" accept=".sra,.srm,.sav,.SaveRAM" style="display:none">
  </div>
  <div id="slots"></div>
</div>
<div id="previewModal" style="display:none" onclick="if(event.target===this)closePreview()">
  <div class="preview-box">
    <div class="preview-header">Export Preview</div>
    <pre id="previewContent"></pre>
    <div class="preview-actions">
      <button class="export-btn" onclick="exportFromPreview()">Export .sav</button>
      <button class="preview-btn" onclick="closePreview()">Close</button>
    </div>
  </div>
</div>
<script src="converter.js"></script>
</body>
</html>
